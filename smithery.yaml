name: sentiment-analysis-ai-mcp
description: 'Sentiment Analysis Ai MCP server. Tools: analyze sentiment, batch analyze,
  compare sentiments. Built by MEOK AI Labs.'
version: 1.0.0
tools:
- name: analyze_sentiment
  description: Analyse the sentiment of a text. Returns score (0-1), label (positive/negative/neutral/mixed),
    and confidence.
  parameters:
  - name: text
    type: string
    required: true
- name: batch_analyze
  description: Analyse sentiment for multiple texts at once. Provide texts separated
    by '|||' delimiter.
  parameters:
  - name: texts
    type: string
    required: true
- name: compare_sentiments
  description: Compare the sentiment of two texts side by side.
  parameters:
  - name: text_a
    type: string
    required: true
  - name: text_b
    type: string
    required: true
- name: extract_emotions
  description: Detect emotions present in text. Returns detected emotions with intensity
    scores.
  parameters:
  - name: text
    type: string
    required: true
